services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gestao_modular
    ports:
      - "5432:5432"
    volumes:
      - gestao_modular_data:/var/lib/postgresql/data

volumes:
  gestao_modular_data:
